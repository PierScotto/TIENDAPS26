databases:
  - name: novatech-db
    plan: free
    databaseName: novatech_store
    user: novatech_user

services:
  - type: web
    name: novatech-store
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: novatech-db
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
